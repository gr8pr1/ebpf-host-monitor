groups:
- name: ebpf-security-alerts
  rules:

  # ---- Agent Availability ----

  - alert: EBPFExporterDown
    expr: up{job="ebpf_agent"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "eBPF exporter down"
      description: "The eBPF agent is unreachable on {{ $labels.instance }}. Security monitoring is offline."

  # ---- Execution Monitoring ----

  - alert: HighExecutionRate
    expr: rate(ebpf_exec_events_total[5m]) > 1.5 * avg_over_time(rate(ebpf_exec_events_total[5m])[1h:5m])
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Execution rate anomaly detected"
      description: "Execution rate on {{ $labels.instance }} is 1.5x above the rolling 1h baseline. Current: {{ $value | humanize }} exec/sec."

  - alert: CriticalExecutionSpike
    expr: rate(ebpf_exec_events_total[2m]) > 3 * avg_over_time(rate(ebpf_exec_events_total[5m])[1h:5m])
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Critical execution spike"
      description: "Execution rate on {{ $labels.instance }} is 3x above baseline. Possible automated attack. Current: {{ $value | humanize }} exec/sec."

  # ---- Privilege Escalation ----

  - alert: SudoUsageDetected
    expr: increase(ebpf_sudo_events_total[5m]) > 0
    for: 0m
    labels:
      severity: info
    annotations:
      summary: "Sudo command executed"
      description: "Sudo detected on {{ $labels.instance }}. Events in last 5m: {{ $value }}."

  - alert: RapidSudoUsage
    expr: rate(ebpf_sudo_events_total[5m]) > 0.1
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Rapid sudo usage"
      description: "High sudo rate of {{ $value | humanize }}/sec on {{ $labels.instance }}. Possible privilege escalation attack."

  - alert: SetuidDetected
    expr: increase(ebpf_setuid_events_total[5m]) > 0
    for: 0m
    labels:
      severity: warning
    annotations:
      summary: "setuid() syscall detected"
      description: "A setuid() call was made on {{ $labels.instance }}. Possible privilege escalation bypassing sudo."

  - alert: SetgidDetected
    expr: increase(ebpf_setgid_events_total[5m]) > 0
    for: 0m
    labels:
      severity: warning
    annotations:
      summary: "setgid() syscall detected"
      description: "A setgid() call was made on {{ $labels.instance }}. Possible privilege escalation."

  # ---- Sensitive File Access ----

  - alert: PasswdReadDetected
    expr: increase(ebpf_passwd_read_events_total[5m]) > 0
    for: 0m
    labels:
      severity: warning
    annotations:
      summary: "/etc/passwd read detected"
      description: "Someone read /etc/passwd on {{ $labels.instance }}. Events in last 5m: {{ $value }}."

  - alert: SensitiveFileAccess
    expr: increase(ebpf_sensitive_file_access_total[5m]) > 0
    for: 0m
    labels:
      severity: warning
    annotations:
      summary: "Sensitive file accessed"
      description: "Access to /etc/shadow, /etc/sudoers, or authorized_keys detected on {{ $labels.instance }}. Events: {{ $value }}."

  - alert: RapidSensitiveFileAccess
    expr: rate(ebpf_sensitive_file_access_total[5m]) > 0.05
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Rapid sensitive file access"
      description: "Repeated access to sensitive files on {{ $labels.instance }} at {{ $value | humanize }}/sec. Possible credential harvesting."

  # ---- Network / C2 Detection ----

  - alert: SuspiciousOutboundConnection
    expr: increase(ebpf_suspicious_connect_events_total[5m]) > 0
    for: 0m
    labels:
      severity: critical
    annotations:
      summary: "Connection to suspicious port detected"
      description: "Outbound connection to a known C2 port (4444, 1337, etc.) on {{ $labels.instance }}. Possible reverse shell or C2 beacon."

  - alert: HighOutboundConnectRate
    expr: rate(ebpf_connect_events_total[5m]) > 1.5 * avg_over_time(rate(ebpf_connect_events_total[5m])[1h:5m])
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Outbound connection rate anomaly"
      description: "Connect rate on {{ $labels.instance }} is 1.5x above rolling baseline. Current: {{ $value | humanize }}/sec."

  # ---- Process Injection ----

  - alert: PtraceDetected
    expr: increase(ebpf_ptrace_events_total[5m]) > 0
    for: 0m
    labels:
      severity: critical
    annotations:
      summary: "ptrace() syscall detected"
      description: "A ptrace() call was made on {{ $labels.instance }}. Possible process injection or debugger attachment (MITRE T1055)."

  - alert: RapidPtraceUsage
    expr: rate(ebpf_ptrace_events_total[5m]) > 0.02
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Rapid ptrace usage"
      description: "Multiple ptrace() calls on {{ $labels.instance }} at {{ $value | humanize }}/sec. Active process injection attack likely."

- name: infrastructure-alerts
  rules:

  - alert: NodeExporterDown
    expr: up{job="node_exporter"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Node Exporter down"
      description: "Node exporter is not reachable on {{ $labels.instance }}."
