server:
  port: 9110
  metrics_path: /metrics
  # TLS configuration (optional)
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
  # Basic auth (optional)
  basic_auth:
    enabled: false
    username: ""
    password: ""

poll_interval: 1s

# BPF object file path (relative to binary or absolute)
bpf_object: bpf/exec.bpf.o

# Tracepoints to attach eBPF programs to
tracepoints:
  - group: syscalls
    name: sys_enter_execve
    program: trace_exec
  - group: syscalls
    name: sys_enter_connect
    program: trace_connect
  - group: syscalls
    name: sys_enter_ptrace
    program: trace_ptrace
  - group: syscalls
    name: sys_enter_openat
    program: trace_openat
  - group: syscalls
    name: sys_enter_setuid
    program: trace_setuid
  - group: syscalls
    name: sys_enter_setgid
    program: trace_setgid

# Metrics to expose — each maps a BPF per-CPU map to a Prometheus counter
metrics:
  # Execution monitoring
  - name: ebpf_exec_events_total
    help: "Total execve events recorded by eBPF"
    bpf_map: exec_counter

  - name: ebpf_sudo_events_total
    help: "Total sudo privilege escalation events recorded by eBPF"
    bpf_map: sudo_counter

  - name: ebpf_passwd_read_events_total
    help: "Total /etc/passwd read attempts recorded by eBPF"
    bpf_map: passwd_read_counter

  # Network monitoring
  - name: ebpf_connect_events_total
    help: "Total outbound connect() syscalls recorded by eBPF"
    bpf_map: connect_counter

  - name: ebpf_suspicious_connect_events_total
    help: "Total connections to suspicious ports (C2 ports) recorded by eBPF"
    bpf_map: suspicious_connect_counter

  # Process injection
  - name: ebpf_ptrace_events_total
    help: "Total ptrace() syscalls (process injection/debugger attach) recorded by eBPF"
    bpf_map: ptrace_counter

  # Sensitive file access
  - name: ebpf_sensitive_file_access_total
    help: "Total openat() on sensitive files (/etc/shadow, /etc/sudoers, ~/.ssh/authorized_keys)"
    bpf_map: sensitive_file_counter

  # Privilege escalation (non-sudo)
  - name: ebpf_setuid_events_total
    help: "Total setuid() syscalls recorded by eBPF"
    bpf_map: setuid_counter

  - name: ebpf_setgid_events_total
    help: "Total setgid() syscalls recorded by eBPF"
    bpf_map: setgid_counter
