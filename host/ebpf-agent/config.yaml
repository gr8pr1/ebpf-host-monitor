server:
  port: 9110
  metrics_path: /metrics
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
  basic_auth:
    enabled: false
    username: ""
    password: ""

# Host identification (auto-detected from /etc/machine-id if empty)
host:
  id: ""
  labels:
    environment: ""
    role: ""

# Adaptive baseline configuration
baseline:
  learning_duration: 168h
  aggregation_window: 1m
  recalibration_interval: 24h
  ewma_alpha: 0.01
  min_stddev: 1.0                    # floor to prevent +Inf z-scores on constant dimensions
  state_file: /var/lib/ebpf-agent/baseline.db
  new_dimension_learn_window: 24h    # reserved for fast-track learning of new dimensions

# Anomaly scoring thresholds
scoring:
  zscore_threshold: 3.0
  minimum_samples: 60
  cold_start_severity: warning       # severity for dimensions seen for the first time post-learning
  mad_enabled: false                 # use robust median/MAD scoring when true
  ceilings: {}                       # optional per-metric hard caps, e.g. ptrace: 10

# Container monitoring (requires cgroup v2)
container_monitoring:
  enabled: false
  cgroup_root: /sys/fs/cgroup

# Baseline dimensions to track
dimensions:
  per_user: true
  per_process: true
  per_container: false
  network: true
  filesystem: true
  scheduling: true

# Tracepoints to attach eBPF programs to
tracepoints:
  # Execution monitoring
  - group: syscalls
    name: sys_enter_execve
    program: trace_exec
  # Network monitoring
  - group: syscalls
    name: sys_enter_connect
    program: trace_connect
  # Process injection
  - group: syscalls
    name: sys_enter_ptrace
    program: trace_ptrace
  # Sensitive file access
  - group: syscalls
    name: sys_enter_openat
    program: trace_openat
  # Privilege escalation
  - group: syscalls
    name: sys_enter_setuid
    program: trace_setuid
  - group: syscalls
    name: sys_enter_setgid
    program: trace_setgid
  # Process lifecycle
  - group: sched
    name: sched_process_fork
    program: trace_fork
  - group: sched
    name: sched_process_exit
    program: trace_exit
  # Network: new listening ports
  - group: syscalls
    name: sys_enter_bind
    program: trace_bind
  # DNS monitoring
  - group: syscalls
    name: sys_enter_sendto
    program: trace_sendto
  # Capability changes
  - group: syscalls
    name: sys_enter_capset
    program: trace_capset

# OpenTelemetry — primary telemetry path (traces + metrics + log provider)
otel:
  enabled: false
  endpoint: "127.0.0.1:4317"
  # OTLP gRPC only (http/protobuf not implemented in agent)
  protocol: grpc
  insecure: true
  # Reserved: OTLP gRPC metadata not wired yet (exporter uses dial options only)
  headers: {}
  export_metrics: true
  export_traces: true
  export_logs: true
  metric_export_interval: 60s
  sampling:
    ptrace: 1.0
    suspicious_connect: 1.0
    capset: 1.0
    sensitive_file: 1.0
    setuid: 1.0
    sudo: 1.0
    bind: 0.1
    connect: 0.01
    dns: 0.01
    exec: 0.01
    fork: 0.0
    exit: 0.0
  # Reserved: batch sizing is SDK default; these fields are not applied in otelexport yet
  batch:
    max_queue_size: 8192
    max_export_batch: 512
    export_timeout: 30s
  resource_attributes:
    service.name: "ebpf-agent"
