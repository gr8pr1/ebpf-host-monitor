# Prometheus alert rules aligned with the agent's health-only /metrics endpoint.
# Detection output (anomalies, MITRE tags) is logged to journald, not exported as Prom metrics.

groups:
- name: ebpf-agent-health
  rules:

  - alert: EBPFAgentDown
    expr: up{job="ebpf_agent"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "eBPF agent unreachable on {{ $labels.instance }}"
      description: "Scrape failed. The agent may be down or the network path blocked."

  - alert: BaselineLearningStalled
    expr: ebpf_baseline_phase == 1 and ebpf_baseline_progress < 0.1
    for: 24h
    labels:
      severity: warning
    annotations:
      summary: "Baseline learning stalled on {{ $labels.host }}"
      description: "Agent has been in learning phase with under 10% progress for over 24h. Check logs and disk for state store."

  - alert: RingbufBackpressure
    expr: increase(ebpf_ringbuf_drops_total[5m]) > 0
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Ringbuf drops on {{ $labels.host }}"
      description: "Events were dropped due to full channel backpressure. Consider load or buffer sizing."
